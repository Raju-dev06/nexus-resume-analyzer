# Server configuration
server.port=8080

# MySQL DataSource settings
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nexus_resume_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Load local dev secrets (ignored by Git)
spring.profiles.include=dev

# AI Integration Configurations
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent

# JSearch API settings (RapidAPI)
jsearch.api.url=https://jsearch.p.rapidapi.com/search
jsearch.api.host=jsearch.p.rapidapi.com
jsearch.api.key=${JSEARCH_API_KEY:}

# Security JWT details
nexus.jwt.secret=${JWT_SECRET:}
nexus.jwt.expiration-ms=86400000

# CORS Security
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

